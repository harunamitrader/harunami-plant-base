<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">植物ホルモンの全体像インフォグラフィック</title>
  <desc id="desc">植物ホルモンを植物の合図として、5大ホルモンの主な働きと園芸で見えるサインをまとめた図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#fff4ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#cfb7a3" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="1600" height="920" rx="40" fill="url(#bg)"/>
  <rect x="56" y="56" width="1488" height="808" rx="34" fill="#fffdfa" stroke="#eedfd2"/>
  <text x="98" y="128" fill="#8f5971" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">Overview</text>
  <text x="98" y="188" fill="#4f4137" font-size="60" font-weight="700" font-family="'Yu Mincho','Noto Serif JP',serif">植物ホルモンは、木の反応を切り替える「合図」</text>
  <text x="98" y="232" fill="#6d5b4e" font-size="28" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">1つで全てを決める命令ではなく、複数の合図が重なって芽・枝・葉・果実の動きを変えます。</text>
  <g filter="url(#shadow)">
    <rect x="563" y="256" width="474" height="360" rx="34" fill="#fff" stroke="#ecd9cb"/>
    <text x="800" y="316" text-anchor="middle" fill="#5b4b40" font-size="38" font-weight="700" font-family="'Yu Mincho','Noto Serif JP',serif">木の中で起きること</text>
    <circle cx="800" cy="432" r="90" fill="#eef6df" stroke="#d6e7bf"/>
    <rect x="774" y="385" width="52" height="122" rx="18" fill="#8b6a4a"/>
    <path d="M800 340 C745 370 718 413 718 470 C718 514 748 554 800 565 C852 554 882 514 882 470 C882 413 855 370 800 340Z" fill="#9fca7a"/>
    <path d="M720 470 C688 508 650 532 603 544" fill="none" stroke="#8b6a4a" stroke-width="14" stroke-linecap="round"/>
    <path d="M880 470 C912 508 950 532 997 544" fill="none" stroke="#8b6a4a" stroke-width="14" stroke-linecap="round"/>
    <path d="M800 505 V580" fill="none" stroke="#8b6a4a" stroke-width="14" stroke-linecap="round"/>
    <text x="800" y="640" text-anchor="middle" fill="#6b5a4e" font-size="24" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">芽・葉・根・種・果実で作られ、場所ごとに役割が違う</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="120" y="312" width="320" height="128" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <circle cx="184" cy="376" r="34" fill="#f4b8c7"/>
    <text x="236" y="362" fill="#4f4137" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">オーキシン</text>
    <text x="236" y="397" fill="#6d5b4e" font-size="22" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">枝先優先・発根・曲がる反応</text>
    <rect x="120" y="488" width="320" height="128" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <circle cx="184" cy="552" r="34" fill="#8cc8f1"/>
    <text x="236" y="538" fill="#4f4137" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">ジベレリン</text>
    <text x="236" y="573" fill="#6d5b4e" font-size="22" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">新梢が伸びる・発芽が動く</text>
    <rect x="1160" y="312" width="320" height="128" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <circle cx="1224" cy="376" r="34" fill="#a8d28a"/>
    <text x="1276" y="362" fill="#4f4137" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">サイトカイニン</text>
    <text x="1276" y="397" fill="#6d5b4e" font-size="22" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">芽吹き・細胞分裂・若さ維持</text>
    <rect x="1160" y="488" width="320" height="128" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <circle cx="1224" cy="552" r="34" fill="#f6d57e"/>
    <text x="1276" y="538" fill="#4f4137" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">エチレン</text>
    <text x="1276" y="573" fill="#6d5b4e" font-size="22" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">熟す・落ちる・老化が進む</text>
    <rect x="640" y="664" width="320" height="128" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <circle cx="704" cy="728" r="34" fill="#c7b1ea"/>
    <text x="756" y="714" fill="#4f4137" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">アブシシン酸</text>
    <text x="756" y="749" fill="#6d5b4e" font-size="22" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">休眠・節水・乾燥ストレス対応</text>
  </g>
  <path d="M440 376 C490 376 520 394 563 430" fill="none" stroke="#f4b8c7" stroke-width="8" stroke-linecap="round"/>
  <path d="M440 552 C495 540 524 512 563 466" fill="none" stroke="#8cc8f1" stroke-width="8" stroke-linecap="round"/>
  <path d="M1037 430 C1078 395 1110 376 1160 376" fill="none" stroke="#a8d28a" stroke-width="8" stroke-linecap="round"/>
  <path d="M1037 466 C1084 514 1112 541 1160 552" fill="none" stroke="#f6d57e" stroke-width="8" stroke-linecap="round"/>
  <path d="M800 616 V664" fill="none" stroke="#c7b1ea" stroke-width="8" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <rect x="106" y="708" width="462" height="110" rx="28" fill="#fff" stroke="#ecd9cb"/>
    <text x="136" y="754" fill="#5b4b40" font-size="28" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">園芸で見えるサイン</text>
    <text x="136" y="793" fill="#6d5b4e" font-size="22" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">芽吹き方 / 枝の伸び / 葉の張り / 落花・落果 / 熟し方 / 水切れ時の止まり方</text>
    <rect x="1028" y="708" width="462" height="110" rx="28" fill="#fff" stroke="#ecd9cb"/>
    <text x="1058" y="754" fill="#5b4b40" font-size="28" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">管理で効く考え方</text>
    <text x="1058" y="793" fill="#6d5b4e" font-size="22" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">切り戻し / 間引き / 水と根の回復 / 施肥の強さ / 収穫適期の見極め</text>
  </g>
</svg>
