<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 940" role="img" aria-labelledby="title desc">
  <title id="title">植物ホルモンのページの読み方ガイド</title>
  <desc id="desc">簡易マスコットと一緒に、木の反応を見る順番、ホルモンの考え方、管理判断へのつなげ方を4段階で示した図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#fff4ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#d9b7a3" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1400" height="940" rx="40" fill="url(#bg)"/>
  <circle cx="120" cy="100" r="90" fill="#fbe5ec"/>
  <circle cx="1280" cy="120" r="120" fill="#eef6df"/>
  <circle cx="1240" cy="820" r="110" fill="#fdf0d4"/>
  <rect x="58" y="58" width="1284" height="824" rx="34" fill="#fffdfa" stroke="#ecd8ca"/>
  <text x="92" y="130" fill="#8f5971" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">読み方ガイド</text>
  <text x="92" y="188" fill="#4f4137" font-size="56" font-weight="700" font-family="'Yu Mincho','Noto Serif JP',serif">植物ホルモンは「木の反応」から読む</text>
  <text x="92" y="232" fill="#6d5b4e" font-size="27" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">名前を暗記するより、何が起きているかを先に見ると園芸で使いやすくなります。</text>

  <g filter="url(#shadow)">
    <rect x="98" y="280" width="300" height="500" rx="30" fill="#fff" stroke="#ead8ca"/>
  </g>
  <g>
    <circle cx="248" cy="406" r="88" fill="#fff9f3" stroke="#d8c2b5" stroke-width="4"/>
    <path d="M177 350 L210 286 L236 360 Z" fill="#f7e8da" stroke="#d8c2b5" stroke-width="4"/>
    <path d="M319 350 L286 286 L260 360 Z" fill="#f7e8da" stroke="#d8c2b5" stroke-width="4"/>
    <path d="M160 360 Q248 255 336 360 L286 328 Q248 300 210 328 Z" fill="#8fba66"/>
    <circle cx="309" cy="344" r="22" fill="#f2a6b9"/>
    <circle cx="309" cy="344" r="11" fill="none" stroke="#d2708a" stroke-width="2"/>
    <circle cx="220" cy="410" r="10" fill="#533d32"/>
    <circle cx="276" cy="410" r="10" fill="#533d32"/>
    <circle cx="199" cy="446" r="16" fill="#f7d7da"/>
    <circle cx="297" cy="446" r="16" fill="#f7d7da"/>
    <path d="M248 424 L236 437 H260 Z" fill="#9f6c51"/>
    <path d="M231 452 Q248 466 265 452" fill="none" stroke="#9f6c51" stroke-width="4" stroke-linecap="round"/>
    <path d="M182 430 H140" stroke="#8f7567" stroke-width="4" stroke-linecap="round"/>
    <path d="M314 430 H356" stroke="#8f7567" stroke-width="4" stroke-linecap="round"/>
    <circle cx="248" cy="552" r="46" fill="#b9d8ef"/>
    <circle cx="225" cy="556" r="26" fill="#b9d8ef"/>
    <circle cx="274" cy="558" r="24" fill="#b9d8ef"/>
  </g>
  <text x="132" y="628" fill="#8f5971" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">案内役のひとこと</text>
  <text x="132" y="674" fill="#5e4c41" font-size="24" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">木の内部は見えないので、</text>
  <text x="132" y="708" fill="#5e4c41" font-size="24" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">芽・枝・葉・実の反応で読む。</text>
  <text x="132" y="742" fill="#5e4c41" font-size="24" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">この順番だと、難しい言葉が</text>
  <text x="132" y="776" fill="#5e4c41" font-size="24" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">実際の管理に結びつきやすい。</text>

  <g filter="url(#shadow)">
    <rect x="445" y="285" width="835" height="118" rx="28" fill="#fff" stroke="#ead8ca"/>
    <circle cx="510" cy="344" r="34" fill="#f4b8c7"/>
    <text x="498" y="356" fill="#fff" font-size="34" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">1</text>
    <text x="565" y="332" fill="#4f4137" font-size="34" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">まず木の反応を見る</text>
    <text x="565" y="372" fill="#655448" font-size="24" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">伸びる / 止まる / しおれる / 落ちる を、まず目で見る。</text>
    <rect x="445" y="430" width="835" height="118" rx="28" fill="#fff" stroke="#ead8ca"/>
    <circle cx="510" cy="489" r="34" fill="#8cc8f1"/>
    <text x="497" y="501" fill="#fff" font-size="34" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">2</text>
    <text x="565" y="477" fill="#4f4137" font-size="34" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">次に「どの合図が強いか」を考える</text>
    <text x="565" y="517" fill="#655448" font-size="24" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">枝先優先 / 伸長 / 芽吹き / 熟し / 節水 に読み替える。</text>
    <rect x="445" y="575" width="835" height="118" rx="28" fill="#fff" stroke="#ead8ca"/>
    <circle cx="510" cy="634" r="34" fill="#a8d28a"/>
    <text x="497" y="646" fill="#fff" font-size="34" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">3</text>
    <text x="565" y="622" fill="#4f4137" font-size="34" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">環境条件を必ず足す</text>
    <text x="565" y="662" fill="#655448" font-size="24" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">光 / 水 / 根 / 肥料 / 実つきを足して考える。</text>
    <rect x="445" y="720" width="835" height="118" rx="28" fill="#fff" stroke="#ead8ca"/>
    <circle cx="510" cy="779" r="34" fill="#f6d57e"/>
    <text x="497" y="791" fill="#fff" font-size="34" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">4</text>
    <text x="565" y="767" fill="#4f4137" font-size="34" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">管理判断に変える</text>
    <text x="565" y="807" fill="#655448" font-size="24" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">切り戻し / 間引き / 回復優先 の判断に変える。</text>
  </g>
</svg>
