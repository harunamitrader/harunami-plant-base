<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1780" role="img" aria-labelledby="title desc">
  <title id="title">5大植物ホルモン比較インフォグラフィック</title>
  <desc id="desc">5大植物ホルモンについて、作られやすい場所、園芸で見える反応、管理への生かし方をカード形式で比較した図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#fff4eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#cfb7a3" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1600" height="1780" rx="40" fill="url(#bg)"/>
  <rect x="58" y="58" width="1484" height="1664" rx="34" fill="#fffdfa" stroke="#eedfd2"/>
  <text x="98" y="128" fill="#8f5971" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">Five Hormones</text>
  <text x="98" y="188" fill="#4f4137" font-size="58" font-weight="700" font-family="'Yu Mincho','Noto Serif JP',serif">5大植物ホルモンを、園芸で使うための比較カード</text>
  <text x="98" y="233" fill="#6d5b4e" font-size="28" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">細かな定義より、どこで作られやすく、何が起き、管理でどう読むかを短く押さえる。</text>
  <g filter="url(#shadow)" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">
    <rect x="118" y="286" width="1364" height="240" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <rect x="118" y="560" width="1364" height="240" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <rect x="118" y="834" width="1364" height="240" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <rect x="118" y="1108" width="1364" height="240" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <rect x="118" y="1382" width="1364" height="240" rx="30" fill="#fff" stroke="#ecd9cb"/>
  </g>
  <g font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">
    <circle cx="198" cy="406" r="42" fill="#f4b8c7"/>
    <text x="262" y="392" fill="#4f4137" font-size="34" font-weight="700">オーキシン</text>
    <text x="262" y="432" fill="#6d5b4e" font-size="25">若い芽・若葉・種・果実で作られやすい</text>
    <text x="262" y="478" fill="#5d4d42" font-size="26">見える反応: 枝先が強い、脇芽が休みやすい、挿し木で発根しやすい</text>
    <text x="262" y="514" fill="#5d4d42" font-size="26">管理の読み方: 若木は軽い切り戻しで枝数を増やしやすい</text>

    <circle cx="198" cy="680" r="42" fill="#8cc8f1"/>
    <text x="262" y="666" fill="#4f4137" font-size="34" font-weight="700">ジベレリン</text>
    <text x="262" y="706" fill="#6d5b4e" font-size="25">若い葉・茎の先・発芽中の種で働きやすい</text>
    <text x="262" y="752" fill="#5d4d42" font-size="26">見える反応: 新梢が長く伸びる、春に一気に動く、徒長枝が増える</text>
    <text x="262" y="788" fill="#5d4d42" font-size="26">管理の読み方: 強剪定後の吹き返しや窒素過多を疑う手がかり</text>

    <circle cx="198" cy="954" r="42" fill="#a8d28a"/>
    <text x="262" y="940" fill="#4f4137" font-size="34" font-weight="700">サイトカイニン</text>
    <text x="262" y="980" fill="#6d5b4e" font-size="25">根の先・若い組織で作られやすい</text>
    <text x="262" y="1026" fill="#5d4d42" font-size="26">見える反応: 芽吹きが安定する、脇芽が動きやすい、葉の老化が遅れやすい</text>
    <text x="262" y="1062" fill="#5d4d42" font-size="26">管理の読み方: 根傷みや過湿があると、切っても思うように芽が出にくい</text>

    <circle cx="198" cy="1228" r="42" fill="#f6d57e"/>
    <text x="262" y="1214" fill="#4f4137" font-size="34" font-weight="700">エチレン</text>
    <text x="262" y="1254" fill="#6d5b4e" font-size="25">成熟果実・老化葉・傷んだ組織で増えやすい</text>
    <text x="262" y="1300" fill="#5d4d42" font-size="26">見える反応: 果実が熟す、葉や実が落ちる、傷みが進んだあとに反応が広がる</text>
    <text x="262" y="1336" fill="#5d4d42" font-size="26">管理の読み方: 収穫遅れ、乾燥、根傷みのあとに落果が増えた理由を考えやすい</text>

    <circle cx="198" cy="1502" r="42" fill="#c7b1ea"/>
    <text x="262" y="1488" fill="#4f4137" font-size="34" font-weight="700">アブシシン酸</text>
    <text x="262" y="1528" fill="#6d5b4e" font-size="25">葉・根で作られ、乾燥や寒さで増えやすい</text>
    <text x="262" y="1574" fill="#5d4d42" font-size="26">見える反応: しおれる前から成長が止まる、気孔が閉じる、芽や種が休みやすい</text>
    <text x="262" y="1610" fill="#5d4d42" font-size="26">管理の読み方: 水切れや移植後は、強剪定より先に水と根の立て直しを優先する</text>
  </g>
</svg>
