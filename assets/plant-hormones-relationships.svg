<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1260" role="img" aria-labelledby="title desc">
  <title id="title">植物ホルモンの相互関係インフォグラフィック</title>
  <desc id="desc">植物ホルモンの主要な組み合わせを、枝先優先と芽吹き、伸長と休眠、落葉落果、根と地上部の関係で示した図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#fff5ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#cfb7a3" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1600" height="1260" rx="40" fill="url(#bg)"/>
  <rect x="58" y="58" width="1484" height="1144" rx="34" fill="#fffdfa" stroke="#eedfd2"/>
  <text x="98" y="128" fill="#8f5971" font-size="30" font-weight="700" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">Relationships</text>
  <text x="98" y="188" fill="#4f4137" font-size="58" font-weight="700" font-family="'Yu Mincho','Noto Serif JP',serif">1つずつではなく、組み合わせで木の反応を見る</text>
  <text x="98" y="233" fill="#6d5b4e" font-size="28" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">剪定や管理で使いやすい4つの関係だけ先に押さえると、現場判断がかなり安定します。</text>
  <g filter="url(#shadow)" font-family="'BIZ UDPGothic','Yu Gothic','Noto Sans JP',sans-serif">
    <rect x="110" y="310" width="640" height="350" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <rect x="850" y="310" width="640" height="350" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <rect x="110" y="710" width="640" height="350" rx="30" fill="#fff" stroke="#ecd9cb"/>
    <rect x="850" y="710" width="640" height="350" rx="30" fill="#fff" stroke="#ecd9cb"/>

    <text x="150" y="372" fill="#4f4137" font-size="34" font-weight="700">オーキシン × サイトカイニン</text>
    <circle cx="220" cy="455" r="42" fill="#f4b8c7"/><text x="187" y="463" fill="#fff" font-size="24" font-weight="700">枝先優先</text>
    <circle cx="640" cy="455" r="42" fill="#a8d28a"/><text x="608" y="463" fill="#fff" font-size="24" font-weight="700">芽吹き</text>
    <path d="M280 455 H580" stroke="#d7c2b4" stroke-width="8" stroke-linecap="round"/>
    <polygon points="580,455 552,438 552,472" fill="#d7c2b4"/>
    <text x="150" y="550" fill="#5d4d42" font-size="25">先端が強いと脇芽は休みやすい。</text>
    <text x="150" y="588" fill="#5d4d42" font-size="25">先端を切ると、根からの後押しが勝ちやすくなり芽が動く。</text>

    <text x="890" y="372" fill="#4f4137" font-size="34" font-weight="700">ジベレリン × アブシシン酸</text>
    <circle cx="960" cy="455" r="42" fill="#8cc8f1"/><text x="926" y="463" fill="#fff" font-size="25" font-weight="700">伸びる</text>
    <circle cx="1380" cy="455" r="42" fill="#c7b1ea"/><text x="1348" y="463" fill="#fff" font-size="25" font-weight="700">休む</text>
    <path d="M1020 455 H1320" stroke="#d7c2b4" stroke-width="8" stroke-linecap="round"/>
    <path d="M1320 455 H1020" stroke="#d7c2b4" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 14"/>
    <text x="890" y="550" fill="#5d4d42" font-size="25">春は動き出す側に傾きやすく、</text>
    <text x="890" y="588" fill="#5d4d42" font-size="25">真夏の乾燥や冬は守る側へ寄りやすい。</text>

    <text x="150" y="772" fill="#4f4137" font-size="34" font-weight="700">エチレン × 低オーキシン</text>
    <circle cx="220" cy="855" r="42" fill="#f6d57e"/><text x="187" y="863" fill="#fff" font-size="24" font-weight="700">熟す</text>
    <rect x="392" y="813" width="156" height="84" rx="24" fill="#fbe8ef" stroke="#f1ced8"/>
    <text x="425" y="863" fill="#8f5971" font-size="28" font-weight="700">離れやすい</text>
    <circle cx="640" cy="855" r="42" fill="#f4b8c7"/><text x="604" y="848" fill="#fff" font-size="16" font-weight="700">供給</text><text x="605" y="868" fill="#fff" font-size="16" font-weight="700">低下</text>
    <path d="M280 855 H392" stroke="#d7c2b4" stroke-width="8" stroke-linecap="round"/>
    <path d="M548 855 H580" stroke="#d7c2b4" stroke-width="8" stroke-linecap="round"/>
    <text x="150" y="950" fill="#5d4d42" font-size="25">果実や葉へのオーキシン供給が弱まると、</text>
    <text x="150" y="988" fill="#5d4d42" font-size="25">エチレンの影響で落葉・落果が進みやすい。</text>

    <text x="890" y="772" fill="#4f4137" font-size="34" font-weight="700">根と地上部のバランス</text>
    <circle cx="960" cy="855" r="42" fill="#a8d28a"/><text x="928" y="848" fill="#fff" font-size="16" font-weight="700">根の</text><text x="919" y="868" fill="#fff" font-size="16" font-weight="700">後押し</text>
    <circle cx="1380" cy="855" r="42" fill="#f4b8c7"/><text x="1349" y="848" fill="#fff" font-size="16" font-weight="700">枝先の</text><text x="1348" y="868" fill="#fff" font-size="16" font-weight="700">要求</text>
    <path d="M1020 855 H1320" stroke="#d7c2b4" stroke-width="8" stroke-linecap="round"/>
    <polygon points="1320,855 1292,838 1292,872" fill="#d7c2b4"/>
    <text x="890" y="950" fill="#5d4d42" font-size="25">根が弱い木は、切っても芽吹きが鈍い。</text>
    <text x="890" y="988" fill="#5d4d42" font-size="25">芽吹き不良や葉の小型化があれば、先に根と水を見る。</text>
  </g>
</svg>
